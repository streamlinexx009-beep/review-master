name: Flutter CI

on:
  pull_request:
  push:
    branches:
      - main
      - ui/quez-kaymbu-refresh

jobs:
  analyze-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter version
        run: flutter --version

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Build web debug
        run: flutter build web --debug
