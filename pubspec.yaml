name: review_master

description: ReviewHub - Review Center Management and Learning Platform

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.8.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State Management
  flutter_riverpod: ^2.6.1

  # Routing
  go_router: ^16.0.0

  # Supabase
  supabase_flutter: ^2.9.1

  # Charts & Analytics
  fl_chart: ^1.0.0

  # PDF Viewer
  syncfusion_flutter_pdfviewer: ^30.1.40

  # File Uploads
  file_picker: ^10.2.0

  # Utilities
  intl: ^0.20.2
  uuid: ^4.5.1
  collection: ^1.19.1

  # Equality Helpers
  equatable: ^2.0.7

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/

